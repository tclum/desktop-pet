name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mac:
    name: Build (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build (universal)
        run: npm run build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/

  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build
        run: npm run build -- --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
