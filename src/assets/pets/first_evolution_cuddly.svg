<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder art. Real cuddly 1st-evolution design will be done by the
  founder's artist friends pre-launch. This silhouette is intentionally
  round, soft, and warm so users can tell it apart from the powerful
  silhouette at a glance during demos.

  Characteristics: two rounded ear tufts, soft body, gentle closed-curve
  eyes, small blush cheeks, tiny tail tuft. Warm peach/cream palette.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="cuddlyBody" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffe8d4" />
      <stop offset="70%" stop-color="#ffcfa6" />
      <stop offset="100%" stop-color="#f2a675" />
    </radialGradient>
    <radialGradient id="cuddlyBlush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a84" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ff9a84" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- tail tuft -->
  <ellipse cx="158" cy="148" rx="18" ry="12" fill="#ffcfa6" />

  <!-- ear tufts -->
  <ellipse cx="68" cy="56" rx="16" ry="20" fill="#ffd7b3" />
  <ellipse cx="132" cy="56" rx="16" ry="20" fill="#ffd7b3" />

  <!-- inner ear -->
  <ellipse cx="68" cy="62" rx="8" ry="11" fill="#ff9a84" opacity="0.55" />
  <ellipse cx="132" cy="62" rx="8" ry="11" fill="#ff9a84" opacity="0.55" />

  <!-- body (round) -->
  <ellipse cx="100" cy="118" rx="62" ry="58" fill="url(#cuddlyBody)" />

  <!-- blush cheeks -->
  <circle cx="66" cy="125" r="14" fill="url(#cuddlyBlush)" />
  <circle cx="134" cy="125" r="14" fill="url(#cuddlyBlush)" />

  <!-- soft closed-curve eyes (the "happy eyes" shape) -->
  <path d="M 78 108 q 8 -10 16 0" stroke="#3d2418" stroke-width="3.5"
        fill="none" stroke-linecap="round" />
  <path d="M 106 108 q 8 -10 16 0" stroke="#3d2418" stroke-width="3.5"
        fill="none" stroke-linecap="round" />

  <!-- tiny smile -->
  <path d="M 96 132 q 4 4 8 0" stroke="#3d2418" stroke-width="2.5"
        fill="none" stroke-linecap="round" />
</svg>
